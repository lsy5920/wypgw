<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 960" role="img" aria-labelledby="title desc">
  <title id="title">问云派网站重构二点零视觉总览</title>
  <desc id="desc">展示问云派二版网站的色彩、按钮、卡片、导航、首屏和工作台设计方向。</desc>
  <rect width="1440" height="960" fill="#eef4ef"/>
  <image href="../03-视觉资产/背景/wenyun-hero-v2.svg" x="760" y="70" width="560" height="315"/>
  <text x="88" y="114" font-size="54" font-family="SimSun, serif" font-weight="900" fill="#122327">问云派网站重构 2.0</text>
  <text x="90" y="164" font-size="22" font-family="Microsoft YaHei, sans-serif" fill="#557f76">定位：名门山门、清雅江湖、温暖港湾、边界有礼。</text>
  <g transform="translate(88 230)">
    <text y="0" font-size="28" font-family="SimSun, serif" font-weight="900" fill="#122327">色彩系统</text>
    <g transform="translate(0 34)">
      <rect width="110" height="78" rx="8" fill="#122327"/><text x="0" y="104" font-size="16" fill="#122327">墨青</text>
      <rect x="132" width="110" height="78" rx="8" fill="#557f76"/><text x="132" y="104" font-size="16" fill="#122327">玉青</text>
      <rect x="264" width="110" height="78" rx="8" fill="#d5ae62"/><text x="264" y="104" font-size="16" fill="#122327">鎏金</text>
      <rect x="396" width="110" height="78" rx="8" fill="#a83b32"/><text x="396" y="104" font-size="16" fill="#122327">朱砂</text>
      <rect x="528" width="110" height="78" rx="8" fill="#fff8ea" stroke="#d5ae62" stroke-opacity="0.34"/><text x="528" y="104" font-size="16" fill="#122327">宣纸</text>
    </g>
  </g>
  <g transform="translate(88 430)">
    <text y="0" font-size="28" font-family="SimSun, serif" font-weight="900" fill="#122327">组件样式</text>
    <rect x="0" y="36" width="190" height="54" rx="27" fill="#122327"/>
    <text x="95" y="70" text-anchor="middle" font-size="18" fill="#fff8ea" font-family="Microsoft YaHei, sans-serif" font-weight="700">主行动按钮</text>
    <rect x="214" y="36" width="190" height="54" rx="27" fill="#a83b32"/>
    <text x="309" y="70" text-anchor="middle" font-size="18" fill="#fff8ea" font-family="Microsoft YaHei, sans-serif" font-weight="700">朱砂按钮</text>
    <rect x="0" y="132" width="330" height="178" rx="8" fill="#fff8ea" stroke="#d5ae62" stroke-opacity="0.38"/>
    <text x="28" y="184" font-size="28" font-family="SimSun, serif" font-weight="900" fill="#122327">宣纸卡片</text>
    <text x="28" y="226" font-size="17" fill="#557f76" font-family="Microsoft YaHei, sans-serif">用于前台内容和表单说明。</text>
  </g>
  <g transform="translate(760 456)">
    <image href="../03-视觉资产/组件/workbench-grid-v2.svg" width="560" height="392"/>
  </g>
</svg>