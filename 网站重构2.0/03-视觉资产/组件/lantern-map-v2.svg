<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">问云派二版入册灯火图</title>
  <desc id="desc">六盏灯串联阅读金典、进入小院、问心考核、递交名帖、执事审核、列入名册流程。</desc>
  <rect width="1200" height="700" rx="8" fill="#06171d"/>
  <path d="M0 460 C190 342 322 510 506 390 C690 270 826 428 1010 340 C1108 292 1164 300 1200 278 L1200 700 L0 700 Z" fill="#557f76" opacity="0.32"/>
  <path d="M114 350 C270 310 406 390 572 350 C758 305 898 374 1088 326" fill="none" stroke="#d5ae62" stroke-width="4" stroke-linecap="round" opacity="0.62"/>
  <g font-family="Microsoft YaHei, sans-serif" text-anchor="middle">
    <g transform="translate(150 326)">
      <circle r="54" fill="#d5ae62" opacity="0.25"/>
      <ellipse cy="-8" rx="25" ry="34" fill="#f7df9e"/>
      <ellipse cy="-8" rx="12" ry="22" fill="#a83b32"/>
      <text y="82" font-size="24" fill="#fff8ea" font-weight="700">阅读金典</text>
    </g>
    <g transform="translate(330 360)">
      <circle r="54" fill="#d5ae62" opacity="0.25"/>
      <ellipse cy="-8" rx="25" ry="34" fill="#f7df9e"/>
      <ellipse cy="-8" rx="12" ry="22" fill="#a83b32"/>
      <text y="82" font-size="24" fill="#fff8ea" font-weight="700">进入小院</text>
    </g>
    <g transform="translate(510 318)">
      <circle r="54" fill="#d5ae62" opacity="0.25"/>
      <ellipse cy="-8" rx="25" ry="34" fill="#f7df9e"/>
      <ellipse cy="-8" rx="12" ry="22" fill="#a83b32"/>
      <text y="82" font-size="24" fill="#fff8ea" font-weight="700">问心考核</text>
    </g>
    <g transform="translate(690 358)">
      <circle r="54" fill="#d5ae62" opacity="0.25"/>
      <ellipse cy="-8" rx="25" ry="34" fill="#f7df9e"/>
      <ellipse cy="-8" rx="12" ry="22" fill="#a83b32"/>
      <text y="82" font-size="24" fill="#fff8ea" font-weight="700">递交名帖</text>
    </g>
    <g transform="translate(870 320)">
      <circle r="54" fill="#d5ae62" opacity="0.25"/>
      <ellipse cy="-8" rx="25" ry="34" fill="#f7df9e"/>
      <ellipse cy="-8" rx="12" ry="22" fill="#a83b32"/>
      <text y="82" font-size="24" fill="#fff8ea" font-weight="700">执事审核</text>
    </g>
    <g transform="translate(1050 348)">
      <circle r="54" fill="#d5ae62" opacity="0.25"/>
      <ellipse cy="-8" rx="25" ry="34" fill="#f7df9e"/>
      <ellipse cy="-8" rx="12" ry="22" fill="#a83b32"/>
      <text y="82" font-size="24" fill="#fff8ea" font-weight="700">列入名册</text>
    </g>
  </g>
  <text x="78" y="94" font-size="32" font-family="SimSun, serif" font-weight="900" fill="#fff8ea">问云入册灯火图</text>
  <text x="78" y="138" font-size="18" font-family="Microsoft YaHei, sans-serif" fill="#dce9e3">每一步都有回应，每一次申请都有边界。</text>
</svg>